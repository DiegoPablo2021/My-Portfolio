<section id="about" class="section-padding animate-fade-in" style="margin-bottom: 10rem !important;">
  <div class="max-w-4xl mx-auto space-y-8">
    <div class="space-y-6 text-center glass-card p-10 glow-effect">
      <h2 class="text-3xl font-bold text-gradient">About Me</h2>
      <div class="space-y-4 text-justify">
        @for (about of aboutData; track $index) {
        <p class="text-muted-foreground text-lg leading-relaxed">
          {{ about }}
        </p>
        }
      </div>
    </div>
  </div>
</section>
